<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream XI | Pro Squad Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --t-gold: #efbf04;
        }

        body {
            background: #02040a;
            color: white;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #111827 0%, #02040a 100%);
            min-height: 100vh;
        }

        .pitch-canvas {
            width: 100%;
            max-width: 1000px;
            min-height: 980px;
            background-color: #2e7d32;
            background-image: linear-gradient(90deg, transparent 50%, rgba(255, 255, 255, .03) 50%), radial-gradient(#388e3c 1px, transparent 1px);
            background-size: 50px 50px, 20px 20px;
            border: 5px solid #fff;
            border-radius: 20px;
            position: relative;
            margin: 20px auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), inset 0 0 100px rgba(0, 0, 0, 0.3);
            padding: 60px 0 120px 0;
            overflow: hidden;
        }

        .pitch-canvas::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: linear-gradient(to right, transparent 49.5%, #fff 49.5%, #fff 50.5%, transparent 50.5%), radial-gradient(circle at 50% 50%, transparent 10%, #fff 10%, #fff 11%, transparent 11%);
            background-size: 100% 100%, 200px 200px;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.3;
            pointer-events: none;
        }

        .penalty-box {
            position: absolute;
            width: 400px;
            height: 180px;
            border: 4px solid #fff;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.3;
            pointer-events: none;
        }

        .penalty-box.top {
            top: 0;
            border-top: none;
            border-radius: 0 0 120px 120px;
        }

        .penalty-box.bottom {
            bottom: 0;
            border-bottom: none;
            border-radius: 120px 120px 0 0;
        }

        /* CARD & SLOT STYLING */
        .topps-card {
            width: 135px;
            height: 195px;
            position: relative;
            background: #000;
            border-radius: 12px;
            border: 2.5px solid var(--t-gold);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: cardIn 0.4s ease-out;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 15%;
            transform: scale(1.2);
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        .ovr-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--t-gold);
            color: #000;
            font-family: 'Oswald';
            font-size: 18px;
            width: 30px;
            text-align: center;
            font-weight: 900;
            border-radius: 5px;
            z-index: 10;
        }

        .name-plate {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-family: 'Bebas Neue';
            font-size: 16px;
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 0;
            z-index: 5;
        }

        .stats-grid {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30px;
            background: #111;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-top: 1.5px solid var(--t-gold);
            align-items: center;
        }

        .stat-item {
            text-align: center;
            font-size: 9px;
            font-weight: 900;
            color: var(--t-gold);
        }

        .slot {
            width: 145px;
            height: 205px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            position: relative;
        }

        .pos-label {
            font-family: 'Oswald';
            font-size: 20px;
            color: rgba(255, 255, 255, 0.1);
            font-weight: 900;
            position: absolute;
            pointer-events: none;
        }

        .slot.active {
            background: rgba(239, 191, 4, 0.2);
            border-color: var(--t-gold);
        }

        .sidebar {
            background: rgba(0, 0, 0, 0.92);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .about-section {
            background: rgba(239, 191, 4, 0.05);
            border: 1px solid rgba(239, 191, 4, 0.2);
            border-radius: 16px;
            padding: 15px;
            margin-top: auto;
        }

        #search-bar {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 18px;
            border-radius: 14px;
            width: 100%;
            outline: none;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: var(--t-gold);
            border-radius: 10px;
        }

        /* BENCH STYLING */
        .bench-container {
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>

            </div>

            { n: 'Gianluigi Buffon', w: 'Gianluigi Buffon', p: 'GK', s: [82, 92, 90] },
            { n: 'Iker Casillas', w: 'Iker Casillas', p: 'GK', s: [90, 91, 88] },
            { n: 'Petr Čech', w: 'Petr Čech', p: 'GK', s: [80, 89, 87] },
            { n: 'Oliver Kahn', w: 'Oliver Kahn', p: 'GK', s: [85, 93, 84] },
            { n: 'Gurpreet Singh Sandhu', w: 'Gurpreet Singh Sandhu', p: 'GK', s: [68, 75, 72] },
            { n: 'Hugo Lloris', w: 'Hugo Lloris', p: 'GK', s: [74, 85, 84] },
            { n: 'Daniel Schmidt', w: 'Daniel Schmidt', p: 'GK', s: [70, 84, 82] },
            { n: 'Bento', w: 'Bento (footballer)', p: 'GK', s: [84, 88, 85] },
            { n: 'Koen Casteels', w: 'Koen Casteels', p: 'GK', s: [75, 85, 82] },
            { n: 'Édouard Mendy', w: 'Édouard Mendy', p: 'GK', s: [82, 85, 80] },
            { n: 'Zion Suzuki', w: 'Zion Suzuki', p: 'GK', s: [78, 82, 75] },
            { n: 'Keisuke Osako', w: 'Keisuke Osako', p: 'GK', s: [75, 80, 78] },
            { n: 'Kosei Tani', w: 'Kosei Tani', p: 'GK', s: [74, 79, 76] }
        ];

        const coaches = [
            { n: 'Pep Guardiola', w: 'Pep Guardiola' },
            { n: 'Mikel Arteta', w: 'Mikel Arteta' },
            { n: 'Arne Slot', w: 'Arne Slot' },
            { n: 'Carlo Ancelotti', w: 'Carlo Ancelotti' },
            { n: 'Hansi Flick', w: 'Hansi Flick' },
            { n: 'Xabi Alonso', w: 'Xabi Alonso' },
            { n: 'Sir Alex Ferguson', w: 'Alex Ferguson' },
            { n: 'José Mourinho', w: 'José Mourinho' },
            { n: 'Jürgen Klopp', w: 'Jürgen Klopp' },
            { n: 'Lionel Scaloni', w: 'Lionel Scaloni' },
            { n: 'Zinedine Zidane', w: 'Zinedine Zidane' },
            { n: 'Arsène Wenger', w: 'Arsène Wenger' },
            { n: 'Johan Cruyff', w: 'Johan Cruyff' },
            { n: 'Unai Emery', w: 'Unai Emery' },
            { n: 'Diego Simeone', w: 'Diego Simeone' },
            { n: 'Antonio Conte', w: 'Antonio Conte' },
            { n: 'Vicente del Bosque', w: 'Vicente del Bosque' },
            { n: 'Marcello Lippi', w: 'Marcello Lippi' },
            { n: 'Thomas Tuchel', w: 'Thomas Tuchel' },
            { n: 'Julian Nagelsmann', w: 'Julian Nagelsmann' },
            { n: 'Erik ten Hag', w: 'Erik ten Hag' },
            { n: 'Luis Enrique', w: 'Luis Enrique' },
            { n: 'Fabio Capello', w: 'Fabio Capello' },
            { n: 'Vincent Kompany', w: 'Vincent Kompany' },
            { n: 'Niko Kovač', w: 'Niko Kovac' },
            { n: 'Kasper Hjulmand', w: 'Kasper Hjulmand' },
            { n: 'Sebastian Hoeneß', w: 'Sebastian Hoeneß' },
            { n: 'Ole Werner', w: 'Ole Werner' },
            { n: 'Frank Schmidt', w: 'Frank Schmidt' },
            { n: 'Jorge Jesus', w: 'Jorge Jesus' },
            { n: 'Simone Inzaghi', w: 'Simone Inzaghi' },
            { n: 'Sérgio Conceição', w: 'Sergio Conceicao' },
            { n: 'Brendan Rodgers', w: 'Brendan Rodgers' },
            { n: 'Matthias Jaissle', w: 'Matthias Jaissle' },
            { n: 'Christophe Galtier', w: 'Christophe Galtier' },
            { n: 'Steven Gerrard', w: 'Steven Gerrard' }
        ];

        let activeTab = 'p', dragSource = null, currentSquad = new Map();

        async function fetchWikiImg(title) {
            try {
                const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
                const d = await res.json();
                return d.thumbnail ? d.thumbnail.source : `https://ui-avatars.com/api/?name=${title}&background=111&color=efbf04`;
            } catch { return `https://ui-avatars.com/api/?name=${title}&background=111&color=efbf04`; }
        }

        function filterList() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const source = activeTab === 'p' ? players : coaches;
            const filtered = source.filter(item => item.n.toLowerCase().includes(query));
            renderList(filtered);
        }

        async function renderList(items) {
            const list = document.getElementById('data-list');
            list.innerHTML = '';
            for (const item of items) {
                const div = document.createElement('div');
                div.className = "flex items-center gap-4 p-3 bg-white/5 rounded-2xl border border-white/5 cursor-grab hover:bg-white/10";
                div.draggable = true;
                const placeholder = `https://ui-avatars.com/api/?name=${item.n}&background=111&color=efbf04`;
                div.innerHTML = `
            <img src="${placeholder}" data-src="${item.w}" class="wiki-loader w-12 h-12 object-cover rounded-lg">
            <div>
                <p class="font-bold text-[10px] text-yellow-500 uppercase">${item.p || 'COACH'}</p>
                <p class="font-bold text-xs uppercase">${item.n}</p>
            </div>`;
                div.ondragstart = async () => {
                    const imgUrl = await fetchWikiImg(item.w);
                    dragSource = { ...item, img: imgUrl };
                };
                list.appendChild(div);
            }
            document.querySelectorAll('.wiki-loader').forEach(async img => {
                img.src = await fetchWikiImg(img.dataset.src);
            });
        }

        function setTab(t) {
            activeTab = t;
            document.getElementById('btnP').className = t === 'p' ? "flex-1 py-3 rounded-xl bg-yellow-500 text-black font-black text-xs" : "flex-1 py-3 rounded-xl bg-zinc-800 text-white font-black text-xs";
            document.getElementById('btnC').className = t === 'c' ? "flex-1 py-3 rounded-xl bg-yellow-500 text-black font-black text-xs" : "flex-1 py-3 rounded-xl bg-zinc-800 text-white font-black text-xs";
            filterList();
        }

        const labels = {
            // --- Attacking Formations ---
            '433': [['LW', 'ST', 'RW'], ['CM', 'CAM', 'CM'], ['LB', 'CB', 'CB', 'RB'], ['GK']],
            '424': [['LW', 'ST', 'ST', 'RW'], ['CM', 'CM'], ['LB', 'CB', 'CB', 'RB'], ['GK']],
            '343': [['LW', 'ST', 'RW'], ['LM', 'CM', 'CM', 'RM'], ['CB', 'CB', 'CB'], ['GK']],
            '4321': [['CF', 'ST', 'CF'], ['CM', 'CM', 'CM'], ['LB', 'CB', 'CB', 'RB'], ['GK']],

            // --- Balanced / Hybrid Formations ---
            '442': [['ST', 'ST'], ['LM', 'CM', 'CM', 'RM'], ['LB', 'CB', 'CB', 'RB'], ['GK']],

            // --- Defensive / Counter-Attack Formations ---
            '541': [['ST'], ['LM', 'CM', 'CM', 'RM'], ['LWB', 'CB', 'CB', 'CB', 'RWB'], ['GK']],
            '532': [['ST', 'ST'], ['CM', 'CDM', 'CM'], ['LWB', 'CB', 'CB', 'CB', 'RWB'], ['GK']],
            '451': [['ST'], ['LM', 'CM', 'CAM', 'CM', 'RM'], ['LB', 'CB', 'CB', 'RB'], ['GK']],
        };

        function createSlot(pos, isBench = false) {
            const slot = document.createElement('div');
            slot.className = "slot";
            slot.innerHTML = `<span class="pos-label">${pos}</span>`;
            slot.ondragover = e => { e.preventDefault(); slot.classList.add('active'); };
            slot.ondragleave = () => slot.classList.remove('active');
            slot.ondrop = () => {
                slot.classList.remove('active');
                if (!dragSource || !dragSource.s) return;
                const ovr = Math.round(dragSource.s.reduce((a, b) => a + b, 0) / 3);
                slot.innerHTML = `
            <div class="topps-card">
                <div class="ovr-badge">${ovr}</div>
                <img src="${dragSource.img}" class="card-img">
                <div class="name-plate">${dragSource.n.split(' ').pop()}</div>
                <div class="stats-grid">
                    <div class="stat-item">${dragSource.s[0]}</div>
                    <div class="stat-item">${dragSource.s[1]}</div>
                    <div class="stat-item">${dragSource.s[2]}</div>
                </div>
            </div>`;
                if (!isBench) {
                    currentSquad.set(slot, ovr);
                    updateTotalOvr();
                }
            };
            return slot;
        }

        function renderPitch() {
            const grid = document.getElementById('pitch-grid');
            grid.innerHTML = '';
            const form = document.getElementById('form-sel').value;
            labels[form].forEach((rowPos) => {
                const row = document.createElement('div');
                row.className = "flex justify-center gap-14 w-full";
                rowPos.forEach(pos => row.appendChild(createSlot(pos)));
                grid.appendChild(row);
            });
            renderBench();
        }

        function renderBench() {
            const benchGrid = document.getElementById('bench-grid');
            benchGrid.innerHTML = '';
            for (let i = 0; i < 7; i++) {
                benchGrid.appendChild(createSlot('SUB', true));
            }
        }

        function clearPitch() {
            currentSquad.clear();
            renderPitch();
            updateTotalOvr();
            document.getElementById('mgr-slot').innerHTML = `<span class="text-[10px] font-bold text-gray-600 group-hover:text-yellow-500">MANAGER</span>`;
        }

        const mgrSlot = document.getElementById('mgr-slot');
        mgrSlot.ondragover = e => e.preventDefault();
        mgrSlot.ondrop = () => {
            if (dragSource && !dragSource.s) {
                mgrSlot.innerHTML = `<img src="${dragSource.img}" class="w-full h-full object-cover"><div class="absolute bottom-0 w-full bg-black/80 text-[10px] py-2 text-center font-bold">${dragSource.n}</div>`;
            }
        };

        function updateTotalOvr() {
            const scores = Array.from(currentSquad.values());
            const avg = scores.length > 0 ? Math.round(scores.reduce((a, b) => a + b, 0) / 11) : 0;
            document.getElementById('ovr-display').innerText = avg.toString().padStart(2, '0');
        }

        setTab('p');
        renderPitch();
    </script>
</body>
